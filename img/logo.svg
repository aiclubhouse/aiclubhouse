<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6a11cb"/>
      <stop offset="100%" stop-color="#2575fc"/>
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7e5f"/>
      <stop offset="100%" stop-color="#feb47b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="200" rx="20" fill="url(#bg)"/>
  
  <!-- Icon: Brain + House hybrid -->
  <g transform="translate(80, 50) scale(1.5)">
    <!-- House shape -->
    <polygon points="20,0 40,20 0,20" fill="#fff" opacity="0.8"/>
    <rect x="5" y="20" width="30" height="25" fill="#fff" opacity="0.8" rx="3"/>
    
    <!-- Brain circuitry lines -->
    <path d="M10,30 Q20,15 30,30 T50,25" stroke="#ff7e5f" stroke-width="2" fill="none"/>
    <path d="M15,35 Q25,20 35,35 T55,30" stroke="#ff7e5f" stroke-width="2" fill="none"/>
    <circle cx="20" cy="15" r="2" fill="#ff7e5f"/>
    <circle cx="35" cy="15" r="2" fill="#ff7e5f"/>
    <circle cx="50" cy="20" r="2" fill="#ff7e5f"/>
  </g>
  
  <!-- Text -->
  <g font-family="Arial, sans-serif" font-weight="bold" fill="#fff">
    <text x="200" y="120" font-size="36" text-anchor="middle">AI CLUBHOUSE</text>
    <text x="200" y="150" font-size="18" text-anchor="middle" opacity="0.9">Where AI Meets Community</text>
  </g>
</svg>